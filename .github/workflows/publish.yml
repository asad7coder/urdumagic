name: Test, build, and publish

on:
  push:
    branches: [main]
    tags: ['v*']
  release:
    types: [published]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Check gzipped ESM bundle size
        run: |
          SIZE=$(gzip -c dist/urdumagic.es.js | wc -c)
          echo "Gzipped ESM size: $SIZE bytes"
          test "$SIZE" -lt 30720 || (echo "Bundle exceeds 30KB gzipped" && exit 1)

      - name: Publish to npm
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Create GitHub release notes snippet
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "Published tag ${GITHUB_REF_NAME}. See CHANGELOG.md for details."
